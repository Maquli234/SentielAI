<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SentinelAI — Recon Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap');
:root{
  --bg:#060b10; --panel:#0c1420; --panel2:#0f1a28;
  --border:#162030; --accent:#00d4ff; --accent2:#ff3c6e;
  --accent3:#39ff14; --text:#b8c9d9; --muted:#3a5068;
  --crit:#ff1744; --high:#ff6d00; --med:#ffd600;
  --low:#69f0ae; --info:#40c4ff;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;
     font-size:15px;overflow-x:hidden;min-height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,
  rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);z-index:9999}

/* header */
header{display:flex;align-items:center;justify-content:space-between;
       padding:12px 28px;border-bottom:1px solid var(--border);
       background:linear-gradient(90deg,#0c1420,#091525)}
.logo{font-family:'Share Tech Mono',monospace;font-size:1.2rem;
      color:var(--accent);letter-spacing:.2em;
      text-shadow:0 0 18px var(--accent)}
.logo em{color:var(--accent2);font-style:normal}
.hdr-stats{display:flex;gap:24px}
.hdr-stat{display:flex;flex-direction:column;align-items:center}
.hdr-stat .v{font-family:'Share Tech Mono',monospace;font-size:1.5rem;
             color:var(--accent);line-height:1;font-weight:700}
.hdr-stat .l{font-size:.65rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}

/* layout */
.layout{display:grid;grid-template-columns:240px 1fr;height:calc(100vh - 53px)}
aside{background:var(--panel);border-right:1px solid var(--border);overflow-y:auto}
main{overflow-y:auto;padding:20px 24px}

/* sidebar */
.sidebar-section{padding:10px 0}
.sidebar-label{font-family:'Share Tech Mono',monospace;font-size:.6rem;
               letter-spacing:.18em;color:var(--muted);padding:4px 16px 8px;
               text-transform:uppercase}
.target-row{display:flex;align-items:center;gap:8px;padding:8px 16px;
            border-left:3px solid transparent;cursor:pointer;transition:.15s}
.target-row:hover,.target-row.active{background:rgba(0,212,255,.05);
  border-left-color:var(--accent)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tname{font-family:'Share Tech Mono',monospace;font-size:.75rem;overflow:hidden;
       text-overflow:ellipsis;white-space:nowrap;flex:1}
.tscore{font-size:.72rem;font-weight:700;flex-shrink:0}
.dc{color:var(--crit)} .dh{color:var(--high)} .dm{color:var(--med)}
.dl{color:var(--low)}  .di{color:var(--info)}
.dotc{background:var(--crit)} .doth{background:var(--high)}
.dotm{background:var(--med)}  .dotl{background:var(--low)} .doti{background:var(--info)}

/* cards */
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:3px;
      padding:14px 18px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.c1::before{background:var(--accent)} .c2::before{background:var(--accent2)}
.c3::before{background:var(--accent3)} .c4::before{background:var(--med)}
.card .cv{font-family:'Share Tech Mono',monospace;font-size:1.9rem;
          line-height:1;font-weight:700;color:var(--accent)}
.c2 .cv{color:var(--accent2)} .c3 .cv{color:var(--accent3)} .c4 .cv{color:var(--med)}
.card .cl{font-size:.7rem;letter-spacing:.1em;color:var(--muted);
          text-transform:uppercase;margin-top:4px}

/* sections */
.sec{background:var(--panel);border:1px solid var(--border);border-radius:3px;
     margin-bottom:14px;overflow:hidden}
.sec-head{display:flex;align-items:center;padding:10px 16px;
          border-bottom:1px solid var(--border);
          background:linear-gradient(90deg,rgba(0,212,255,.04),transparent)}
.sec-title{font-family:'Share Tech Mono',monospace;font-size:.72rem;
           letter-spacing:.12em;color:var(--accent);text-transform:uppercase}
.sec-body{padding:14px 16px}

/* grid */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* table */
.tbl{width:100%;border-collapse:collapse;font-family:'Share Tech Mono',monospace;
     font-size:.72rem}
.tbl th{color:var(--muted);letter-spacing:.1em;text-transform:uppercase;
        font-size:.62rem;padding:5px 8px;border-bottom:1px solid var(--border);text-align:left}
.tbl td{padding:6px 8px;border-bottom:1px solid rgba(22,32,48,.7);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(0,212,255,.025)}
.pill{display:inline-block;padding:1px 7px;border-radius:2px;
      font-size:.65rem;font-weight:700;letter-spacing:.04em}
.pC{background:rgba(255,23,68,.18);color:var(--crit)}
.pH{background:rgba(255,109,0,.18);color:var(--high)}
.pM{background:rgba(255,214,0,.18);color:var(--med)}
.pL{background:rgba(105,240,174,.18);color:var(--low)}
.pI{background:rgba(64,196,255,.18);color:var(--info)}

/* chart */
.chart-box{position:relative;height:190px}

/* score ring */
.score-row{display:flex;align-items:center;gap:16px;margin-bottom:12px}
.ring-wrap{position:relative;width:86px;height:86px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-num{position:absolute;inset:0;display:flex;align-items:center;
          justify-content:center;font-family:'Share Tech Mono',monospace;
          font-size:1.15rem;font-weight:700}
.reasons{display:flex;flex-wrap:wrap;gap:5px}
.rtag{background:rgba(255,60,110,.1);border:1px solid rgba(255,60,110,.3);
      color:var(--accent2);font-size:.68rem;padding:2px 7px;border-radius:2px;
      font-family:'Share Tech Mono',monospace}

/* loading */
.loading{display:flex;align-items:center;justify-content:center;height:80px;
         color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:.75rem}
.loading::after{content:'';display:inline-block;width:12px;height:12px;
  border:2px solid var(--muted);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite;margin-left:10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* tag */
.tag{display:inline-block;padding:1px 6px;border:1px solid var(--border);
     border-radius:2px;font-size:.65rem;color:var(--muted);
     font-family:'Share Tech Mono',monospace;margin:1px}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<header>
  <div class="logo">SENTINEL<em>AI</em>
    <span style="font-size:.65rem;color:var(--muted);letter-spacing:.08em;margin-left:12px">// RECON DASHBOARD</span>
  </div>
  <div class="hdr-stats">
    <div class="hdr-stat"><span class="v" id="h-targets">—</span><span class="l">Targets</span></div>
    <div class="hdr-stat"><span class="v" id="h-scans">—</span><span class="l">Scans</span></div>
    <div class="hdr-stat"><span class="v" id="h-crit" style="color:var(--crit)">—</span><span class="l">Critical</span></div>
    <div class="hdr-stat"><span class="v" id="h-find">—</span><span class="l">Findings</span></div>
  </div>
</header>

<div class="layout">
  <aside>
    <div class="sidebar-section">
      <div class="sidebar-label">⬡ Targets</div>
      <div id="sidebar-targets"><div class="loading" style="height:50px"></div></div>
    </div>
  </aside>

  <main>
    <div class="cards">
      <div class="card c1"><div class="cv" id="c-score">—</div><div class="cl">Risk Score</div></div>
      <div class="card c2"><div class="cv" id="c-sev">—</div><div class="cl">Severity</div></div>
      <div class="card c3"><div class="cv" id="c-ports">—</div><div class="cl">Open Ports</div></div>
      <div class="card c4"><div class="cv" id="c-finds">—</div><div class="cl">Findings</div></div>
    </div>

    <div class="sec" id="score-sec" style="display:none">
      <div class="sec-head"><span class="sec-title">▶ Attack Surface Analysis</span></div>
      <div class="sec-body">
        <div class="score-row">
          <div class="ring-wrap">
            <svg width="86" height="86" viewBox="0 0 86 86">
              <circle cx="43" cy="43" r="36" fill="none" stroke="#162030" stroke-width="6"/>
              <circle id="ring-arc" cx="43" cy="43" r="36" fill="none"
                      stroke="var(--accent)" stroke-width="6" stroke-linecap="round"
                      stroke-dasharray="226" stroke-dashoffset="226"
                      style="transition:stroke-dashoffset 1s ease"/>
            </svg>
            <div class="ring-num" id="ring-val">—</div>
          </div>
          <div>
            <div style="font-family:'Share Tech Mono',monospace;font-size:.62rem;
                        color:var(--muted);letter-spacing:.12em;margin-bottom:8px">RISK FACTORS</div>
            <div class="reasons" id="reason-tags"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="two-col">
      <div class="sec">
        <div class="sec-head"><span class="sec-title">▶ Service Frequency</span></div>
        <div class="sec-body"><div class="chart-box"><canvas id="svc-chart"></canvas></div></div>
      </div>
      <div class="sec">
        <div class="sec-head"><span class="sec-title">▶ CVE Distribution</span></div>
        <div class="sec-body"><div class="chart-box"><canvas id="cve-chart"></canvas></div></div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-head">
        <span class="sec-title">▶ Findings</span>
        <span style="margin-left:auto;font-family:'Share Tech Mono',monospace;
                     font-size:.68rem;color:var(--muted)" id="find-count"></span>
      </div>
      <div class="sec-body" id="find-body"><div class="loading"></div></div>
    </div>

    <div class="sec">
      <div class="sec-head"><span class="sec-title">▶ Scan History</span></div>
      <div class="sec-body" id="hist-body"><div class="loading"></div></div>
    </div>

    <div class="sec">
      <div class="sec-head"><span class="sec-title">▶ Intelligence Patterns</span></div>
      <div class="sec-body" id="intel-body"><div class="loading"></div></div>
    </div>
  </main>
</div>

<script>
const G = (id) => document.getElementById(id);
const API = (p) => fetch(p).then(r => r.json());
const SEV = {CRITICAL:'var(--crit)',HIGH:'var(--high)',MEDIUM:'var(--med)',LOW:'var(--low)',INFO:'var(--info)'};
const PILL = {CRITICAL:'pC',HIGH:'pH',MEDIUM:'pM',LOW:'pL',INFO:'pI'};
let svcChart, cveChart, allHosts=[], allFinds=[], allScans=[];

async function init() {
  const [scans, hosts, finds, svcFreq, cveFreq] = await Promise.all([
    API('/api/scans'), API('/api/hosts'), API('/api/findings'),
    API('/api/intel/services'), API('/api/intel/cves')
  ]);
  allScans=scans; allHosts=hosts; allFinds=finds;

  const targets = [...new Set(hosts.map(h=>h.address).filter(Boolean))];
  G('h-targets').textContent = targets.length;
  G('h-scans').textContent = scans.length;
  G('h-crit').textContent = hosts.filter(h=>h.risk_label==='CRITICAL').length;
  G('h-find').textContent = finds.length;

  renderSidebar(targets, hosts);
  renderFindings(finds);
  renderHistory(scans);
  renderServiceChart(svcFreq);
  renderCveChart(cveFreq);
  renderIntel();

  if (targets.length) selectTarget(targets[0]);
}

function sevClass(s) { return {CRITICAL:'dc',HIGH:'dh',MEDIUM:'dm',LOW:'dl',INFO:'di'}[s]||'di'; }
function dotClass(s) { return {CRITICAL:'dotc',HIGH:'doth',MEDIUM:'dotm',LOW:'dotl',INFO:'doti'}[s]||'doti'; }

function renderSidebar(targets, hosts) {
  const el = G('sidebar-targets');
  if (!targets.length) { el.innerHTML='<div style="padding:12px 16px;color:var(--muted);font-family:Share Tech Mono,monospace;font-size:.72rem">No data yet</div>'; return; }
  el.innerHTML = targets.map(t => {
    const h = hosts.filter(x=>x.address===t).sort((a,b)=>b.risk_score-a.risk_score)[0];
    const score = h ? (h.risk_score||0).toFixed(1) : '—';
    const sev   = h?.risk_label || 'INFO';
    return `<div class="target-row" id="tr-${btoa(t).replace(/=/g,'')}" onclick="selectTarget('${t}')">
      <div class="dot ${dotClass(sev)}"></div>
      <div class="tname">${t}</div>
      <div class="tscore ${sevClass(sev)}">${score}</div>
    </div>`;
  }).join('');
}

function selectTarget(target) {
  document.querySelectorAll('.target-row').forEach(el=>el.classList.remove('active'));
  const key = btoa(target).replace(/=/g,'');
  const el = G('tr-'+key); if(el) el.classList.add('active');

  const hosts = allHosts.filter(h=>h.address===target);
  const best  = hosts.sort((a,b)=>b.risk_score-a.risk_score)[0];
  if (!best) return;

  const sev   = best.risk_label || 'INFO';
  const score = (best.risk_score||0).toFixed(1);
  G('c-score').textContent = score;
  G('c-sev').textContent   = sev;
  G('c-sev').className     = 'cv ' + sevClass(sev);
  const ports = JSON.parse(best.open_ports||'[]');
  G('c-ports').textContent = ports.length;
  const hFinds = allFinds.filter(f=>f.address===target);
  G('c-finds').textContent = hFinds.length;

  // Score ring
  G('score-sec').style.display='';
  const circ = 226, offset = circ - (best.risk_score/10)*circ;
  const arc = G('ring-arc');
  arc.style.strokeDashoffset = offset;
  arc.style.stroke = SEV[sev]||'var(--accent)';
  G('ring-val').textContent = score;
  G('ring-val').style.color = SEV[sev]||'var(--accent)';

  // Reasons from findings
  const reasons = hFinds.slice(0,8).map(f=>f.title?.substring(0,50)||'');
  G('reason-tags').innerHTML = reasons.length
    ? reasons.map(r=>`<span class="rtag">${r}</span>`).join('')
    : '<span style="color:var(--muted);font-size:.75rem">No findings recorded</span>';
}

function renderFindings(finds) {
  G('find-count').textContent = finds.length + ' records';
  if (!finds.length) { G('find-body').innerHTML='<div style="color:var(--muted);font-family:Share Tech Mono,monospace;font-size:.75rem">No findings yet</div>'; return; }
  const rows = finds.slice(0,60).map(f => {
    const pc = PILL[f.severity]||'pI';
    return `<tr><td><span class="pill ${pc}">${f.severity}</span></td>
      <td style="color:var(--accent);font-family:Share Tech Mono,monospace">${f.address||'—'}</td>
      <td>${f.title||'—'}</td><td>${f.port||'—'}</td></tr>`;
  }).join('');
  G('find-body').innerHTML = `<table class="tbl"><thead><tr>
    <th>Severity</th><th>Host</th><th>Title</th><th>Port</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
}

function renderHistory(scans) {
  if (!scans.length) { G('hist-body').innerHTML='<div style="color:var(--muted);font-family:Share Tech Mono,monospace;font-size:.75rem">No scan history</div>'; return; }
  const rows = scans.slice(0,40).map(s =>
    `<tr><td style="color:var(--muted)">${s.started_at?.substring(0,19)||'—'}</td>
      <td style="color:var(--accent);font-family:Share Tech Mono,monospace">${s.target}</td>
      <td style="color:var(--med)">${s.profile}</td>
      <td style="color:var(--accent3)">${s.host_count}</td></tr>`
  ).join('');
  G('hist-body').innerHTML = `<table class="tbl"><thead><tr>
    <th>Time</th><th>Target</th><th>Profile</th><th>Hosts</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
}

function renderServiceChart(data) {
  const ctx = G('svc-chart').getContext('2d');
  const d = Array.isArray(data) ? data.slice(0,12) : [];
  if (svcChart) svcChart.destroy();
  svcChart = new Chart(ctx, {
    type:'bar',
    data:{labels:d.map(x=>x[0]),datasets:[{label:'Count',data:d.map(x=>x[1]),
      backgroundColor:'rgba(0,212,255,.2)',borderColor:'var(--accent)',borderWidth:1,borderRadius:2}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:'#3a5068',font:{family:'Share Tech Mono',size:9}},grid:{color:'#162030'}},
              y:{ticks:{color:'#3a5068',font:{family:'Share Tech Mono',size:9}},grid:{color:'#162030'}}}}
  });
}

function renderCveChart(data) {
  const ctx = G('cve-chart').getContext('2d');
  const d = Array.isArray(data) ? data.slice(0,8) : [];
  if (cveChart) cveChart.destroy();
  if (!d.length) { ctx.canvas.parentElement.innerHTML='<div style="color:var(--muted);font-family:Share Tech Mono,monospace;font-size:.75rem;padding:40px 0;text-align:center">No CVE data yet</div>'; return; }
  const colors = ['#ff1744','#ff6d00','#ffd600','#69f0ae','#40c4ff','#b388ff','#ff80ab','#00e5ff'];
  cveChart = new Chart(ctx, {
    type:'doughnut',
    data:{labels:d.map(x=>x[0]),datasets:[{data:d.map(x=>x[1]),
      backgroundColor:colors.map(c=>c+'44'),borderColor:colors,borderWidth:1}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'right',labels:{color:'#3a5068',font:{family:'Share Tech Mono',size:9},boxWidth:9}}}}
  });
}

async function renderIntel() {
  const [svcFreq] = await Promise.all([API('/api/intel/services')]);
  const el = G('intel-body');
  if (!svcFreq.length) {
    el.innerHTML='<div style="color:var(--muted);font-family:Share Tech Mono,monospace;font-size:.75rem">Run scans to build intelligence patterns</div>';
    return;
  }
  let html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">';
  html += '<div><div style="font-family:Share Tech Mono,monospace;font-size:.62rem;letter-spacing:.12em;color:var(--muted);margin-bottom:8px">FREQUENT SERVICES</div>';
  html += svcFreq.slice(0,10).map(([s,c])=>
    `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #162030;font-family:Share Tech Mono,monospace;font-size:.72rem">
      <span style="color:var(--accent)">${s}</span><span style="color:var(--muted)">${c}x</span></div>`
  ).join('') + '</div>';
  html += '<div><div style="font-family:Share Tech Mono,monospace;font-size:.62rem;letter-spacing:.12em;color:var(--muted);margin-bottom:8px">MOST SCANNED TARGETS</div>';
  const topTargets = [...new Set(allHosts.map(h=>h.address))].slice(0,8);
  html += topTargets.map(t => {
    const h = allHosts.filter(x=>x.address===t).sort((a,b)=>b.risk_score-a.risk_score)[0];
    const sev = h?.risk_label||'INFO';
    return `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #162030;font-family:Share Tech Mono,monospace;font-size:.72rem">
      <span style="color:var(--text)">${t}</span>
      <span class="${sevClass(sev)}">${(h?.risk_score||0).toFixed(1)}</span></div>`;
  }).join('') + '</div></div>';
  el.innerHTML = html;
}

init().catch(e => {
  G('find-body').innerHTML = `<div style="color:var(--accent2);font-family:Share Tech Mono,monospace;font-size:.8rem">
    Failed to connect to backend — is Flask running?<br><br>${e}</div>`;
  G('hist-body').innerHTML = G('intel-body').innerHTML = '';
  G('sidebar-targets').innerHTML = '<div style="padding:12px 16px;color:var(--muted);font-family:Share Tech Mono,monospace;font-size:.72rem">No data</div>';
});
</script>
</body>
</html>
